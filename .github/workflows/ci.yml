name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: discovery
          POSTGRES_PASSWORD: discovery
          POSTGRES_DB: discovery_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U discovery -d discovery_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://discovery:discovery@localhost:5432/discovery_test?schema=public
      TEST_DATABASE_URL: postgresql://discovery:discovery@localhost:5432/discovery_test?schema=public

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
